rs03_current_torque:
  ros__parameters:
    transport: serial           # serial (official CH340) | socketcan
    serial_device: /dev/ttyUSB0
    serial_baud: 921600
    serial_debug: false
    can_interface: can0         # used only when transport=socketcan
    motor_id: 12
    master_id: 255
    control_mode: current       # current | torque | velocity | position_pp
    auto_enable: false          # first bench test: keep false
    command_timeout_s: 0.30       # tolerate WSL/serial scheduling jitter; still fails safe
    max_current_a: 0.5          # initial bench limit; RS03 protocol limit is 43 A
    max_torque_nm: 1.0          # initial bench limit; RS03 protocol limit is 60 Nm
    torque_soft_velocity_start_rad_s: 0.0  # 0 disables the optional torque demo governor
    torque_soft_velocity_limit_rad_s: 0.0
    torque_soft_brake_gain_nm_per_rad_s: 0.0
    torque_soft_brake_max_nm: 0.0
    torque_speed_feedforward_nm: 0.0
    torque_velocity_filter_alpha: 0.2
    max_velocity_command_rad_s: 0.5
    velocity_current_limit_a: 0.5
    velocity_acceleration_rad_s2: 0.5
    velocity_slew_rate_rad_s2: 0.5
    position_max_offset_rad: 0.2
    position_current_limit_a: 0.5
    position_speed_limit_rad_s: 0.2
    position_acceleration_rad_s2: 0.5
    position_slew_rate_rad_s: 0.05
    position_ramp_max_error_rad: 0.03
    position_tracking_error_rad: 0.5
    current_slew_rate_a_s: 0.5
    torque_slew_rate_nm_s: 1.0
    max_velocity_rad_s: 2.0     # stop output if torque mode runs away
    velocity_trip_samples: 5    # reject isolated encoder/estimator spikes
    max_temperature_c: 60.0
    receive_timeout_ms: 20
