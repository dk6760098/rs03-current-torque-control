rs03_current_torque:
  ros__parameters:
    transport: serial           # serial (official CH340) | socketcan
    serial_device: /dev/ttyUSB0
    serial_baud: 921600
    serial_debug: false
    can_interface: can0         # used only when transport=socketcan
    motor_id: 12
    master_id: 255
    control_mode: current       # current | torque
    auto_enable: false          # first bench test: keep false
    command_timeout_s: 0.10
    max_current_a: 0.5          # initial bench limit; RS03 protocol limit is 43 A
    max_torque_nm: 1.0          # initial bench limit; RS03 protocol limit is 60 Nm
    current_slew_rate_a_s: 0.5
    torque_slew_rate_nm_s: 1.0
    max_velocity_rad_s: 2.0     # stop output if torque mode runs away
    max_temperature_c: 60.0
    receive_timeout_ms: 20
